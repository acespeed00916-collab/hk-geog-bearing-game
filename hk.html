<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港地理方位角大挑戰 Pro (GeogBearing Game)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f0f2f5;
        }
        #header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #game-container {
            display: flex;
            flex: 1;
            position: relative;
        }
        #map {
            flex: 1;
            height: 100%;
        }
        #control-panel {
            width: 340px;
            background-color: white;
            padding: 20px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
        }
        .instruction-box {
            background-color: #e8f4f8;
            border-left: 5px solid #3498db;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .hud-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .hud-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-heading {
            font-weight: bold;
            color: #34495e;
            margin-top: 10px;
            font-size: 0.95em;
        }
        .stat-value {
            font-size: 1.25em;
            color: #e74c3c;
            font-weight: bold;
        }
        .timer-active {
            color: #e74c3c;
            font-size: 1.5em;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #27ae60;
        }
        #result-msg {
            margin-top: 15px;
            font-weight: bold;
            white-space: pre-line;
            font-size: 0.95em;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="header">
        <h2>香港地理方位角挑戰 Pro (GeogBearing)</h2>
    </div>

    <div id="game-container">
        <div id="map"></div>

        <div id="control-panel">
            <div>
                <div class="hud-grid">
                    <div class="hud-card">
                        <div style="font-size: 0.85em; color: #7f8c8d;">目前回合</div>
                        <div id="hud-round" style="font-size: 1.3em; font-weight: bold; color: #2c3e50;">1 / 5</div>
                    </div>
                    <div class="hud-card">
                        <div style="font-size: 0.85em; color: #7f8c8d;">累計總分</div>
                        <div id="hud-score" style="font-size: 1.3em; font-weight: bold; color: #2980b9;">0</div>
                    </div>
                </div>

                <div class="hud-card" style="margin-bottom: 15px; background: #fff5f5;">
                    <div style="font-size: 0.85em; color: #c0392b; font-weight: bold;">剩餘時間</div>
                    <div id="hud-timer" class="timer-active">15</div>
                </div>

                <div class="instruction-box">
                    <strong>任務說明：</strong><br>
                    請根據下方給予的起點與地理線索，在 <strong>15 秒內</strong> 點擊地圖上你認為的目標位置！
                </div>

                <div class="stat-heading">📍 當前起點：</div>
                <div id="start-point-name" style="font-size: 1.15em; color: #2c3e50; font-weight: bold; margin-bottom: 10px;">載入中...</div>

                <div class="stat-heading">🧩 方位與距離線索：</div>
                <p style="background: #fdfefe; padding: 10px; border: 1px dashed #bdc3c7; border-radius: 4px;">
                    從起點往方位角 <span id="hint-bearing" class="stat-value">0</span>° 的方向，<br>
                    直線距離前進 <span id="hint-distance" class="stat-value">0</span> 公里。
                </p>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

                <div id="result-msg"></div>
            </div>

            <button id="next-btn" onclick="nextRound()" style="display: none;">下一題</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 地標數據庫（加入DSE中學地理科常見地形與重要地標）
        const locations = [
            { name: "大帽山 (最高峰)", lat: 22.4116, lng: 114.1242 },
            { name: "西貢萬宜水庫東壩 (六角形岩柱)", lat: 22.3634, lng: 114.3734 },
            { name: "鳳凰山", lat: 22.2522, lng: 113.9614 },
            { name: "東平洲 (頁岩/海蝕平台)", lat: 22.5434, lng: 114.4361 },
            { name: "赤洲 (礫岩/紅層地貌)", lat: 22.5011, lng: 114.3622 },
            { name: "蒲台島 (花崗岩/海蝕隙)", lat: 22.1694, lng: 114.2612 },
            { name: "鶴咀 (海蝕拱/雷音洞)", lat: 22.2097, lng: 114.2575 },
            { name: "尖鼻咀 (米埔濕地/紅樹林)", lat: 22.4891, lng: 114.0118 },
            { name: "南生圍 (錦田河與山貝河交匯處)", lat: 22.4542, lng: 114.0401 },
            { name: "荔枝窩 (客家風水林村落)", lat: 22.5275, lng: 114.2747 },
            { name: "尖沙咀鐘樓", lat: 22.2937, lng: 114.1694 },
            { name: "太平山頂 (凌霄閣)", lat: 22.2711, lng: 114.1497 },
            { name: "香港國際機場 (赤鱲角)", lat: 22.3080, lng: 113.9185 },
            { name: "大嶼山天壇大佛", lat: 22.2540, lng: 113.9050 },
            { name: "葵青貨櫃碼頭", lat: 22.3392, lng: 114.1264 },
            { name: "沙田車公廟", lat: 22.3733, lng: 114.1824 },
            { name: "迪士尼樂園", lat: 22.3130, lng: 114.0433 },
            { name: "東涌新市鎮", lat: 22.2878, lng: 113.9421 },
            { name: "將軍澳坑口 (填海發展區)", lat: 22.3162, lng: 114.2662 },
            { name: "馬鞍山 (新市鎮/鐵礦場舊址)", lat: 22.4219, lng: 114.2324 }
        ];

        let map;
        let startLoc, targetLoc;
        let startMarker, targetMarker, clickMarker, linePolyline;
        
        let gameActive = false;
        let currentRound = 1;
        let totalScore = 0;
        const maxRounds = 5;
        
        let timerInterval;
        let timeLeft = 15;

        function initMap() {
            map = L.map('map').setView([22.36, 114.14], 11);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            map.on('click', onMapClick);
            startNewRound();
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;

            const y = Math.sin(dLon) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) -
                      Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            return (brng + 360) % 360;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function startNewRound() {
            gameActive = true;
            timeLeft = 15;
            document.getElementById('hud-timer').innerText = timeLeft;
            document.getElementById('result-msg').innerHTML = "";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('hud-round').innerText = `${currentRound} / ${maxRounds}`;

            if (startMarker) map.removeLayer(startMarker);
            if (targetMarker) map.removeLayer(targetMarker);
            if (clickMarker) map.removeLayer(clickMarker);
            if (linePolyline) map.removeLayer(linePolyline);

            let startIndex = Math.floor(Math.random() * locations.length);
            let targetIndex;
            do {
                targetIndex = Math.floor(Math.random() * locations.length);
            } while (startIndex === targetIndex);

            startLoc = locations[startIndex];
            targetLoc = locations[targetIndex];

            const bearing = calculateBearing(startLoc.lat, startLoc.lng, targetLoc.lat, targetLoc.lng);
            const distance = calculateDistance(startLoc.lat, startLoc.lng, targetLoc.lat, targetLoc.lng);

            document.getElementById('start-point-name').innerText = startLoc.name;
            document.getElementById('hint-bearing').innerText = Math.round(bearing);
            document.getElementById('hint-distance').innerText = distance.toFixed(1);

            startMarker = L.marker([startLoc.lat, startLoc.lng]).addTo(map)
                .bindPopup(`<b>起點：${startLoc.name}</b>`).openPopup();
            
            map.panTo([startLoc.lat, startLoc.lng]);

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('hud-timer').innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endRound(null); 
            }
        }

        function onMapClick(e) {
            if (!gameActive) return;
            clearInterval(timerInterval);
            endRound(e.latlng);
        }

        function endRound(clickedLatLng) {
            gameActive = false;
            let roundScore = 0;
            let summaryText = "";

            targetMarker = L.marker([targetLoc.lat, targetLoc.lng]).addTo(map)
                .bindPopup(`<b>正確答案：${targetLoc.name}</b>`);

            linePolyline = L.polyline([
                [startLoc.lat, startLoc.lng],
                [targetLoc.lat, targetLoc.lng]
            ], {color: '#2980b9', dashArray: '5, 10'}).addTo(map);

            if (clickedLatLng) {
                const clickLat = clickedLatLng.lat;
                const clickLng = clickedLatLng.lng;

                clickMarker = L.marker([clickLat, clickLng], {
                    icon: L.icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34],
                        shadowSize: [41, 41]
                    })
                }).addTo(map).bindPopup("你選擇的位置").openPopup();

                const errorDistance = calculateDistance(clickLat, clickLng, targetLoc.lat, targetLoc.lng);

                if (errorDistance <= 1.5) {
                    roundScore = 100;
                } else {
                    roundScore = Math.max(0, Math.round(100 - (errorDistance - 1.5) * 10));
                }

                totalScore += roundScore;
                document.getElementById('hud-score').innerText = totalScore;

                let performanceMsg = "";
                if (roundScore >= 90) performanceMsg = "<span style='color:green;'>🏆 簡直是行走的GPS！完美！</span>";
                else if (roundScore >= 60) performanceMsg = "<span style='color:orange;'>👍 很接近了，地理感非常好！</span>";
                else if (roundScore > 0) performanceMsg = "<span style='color:brown;'>🧭 差了一點點，再加把勁！</span>";
                else performanceMsg = "<span style='color:red;'>❌ 偏離太遠（超過11.5公里）得0分。</span>";

                summaryText = `答案揭曉：<b>${targetLoc.name}</b><br>` +
                              `誤差距離：<b>${errorDistance.toFixed(2)}</b> 公里<br>` +
                              `本局得分：<b style="color:#2ecc71; font-size:1.2em;">${roundScore}</b> 分<br>` +
                              performanceMsg;
            } else {
                document.getElementById('hud-timer').innerText = "超時！";
                summaryText = `<span style='color:red; font-size:1.1em;'>⏱️ 時間到！你未能及時作答。</span><br>` +
                              `正確目標是：<b>${targetLoc.name}</b><br>` +
                              `本局得分：<b style="color:red;">0</b> 分`;
                
                map.panTo([targetLoc.lat, targetLoc.lng]);
            }

            const nextBtn = document.getElementById('next-btn');
            if (currentRound < maxRounds) {
                nextBtn.innerText = "下一題";
                nextBtn.style.backgroundColor = "#2ecc71";
            } else {
                nextBtn.innerText = "查看總結算";
                nextBtn.style.backgroundColor = "#9b59b6";
            }
            
            document.getElementById('result-msg').innerHTML = summaryText;
            nextBtn.style.display = "block";
        }

        function nextRound() {
            if (currentRound < maxRounds) {
                currentRound++;
                startNewRound();
            } else {
                let finalRank = "";
                if (totalScore >= 450) finalRank = "🥇 地理大師 (A*) - 你對香港地形瞭如指掌！";
                else if (totalScore >= 350) finalRank = "🥈 專業嚮導 (Level 5) - 地理感非常優秀！";
                else if (totalScore >= 200) finalRank = "🥉 業餘愛好者 - 還算認得方向。";
                else finalRank = "⏱️ 再多讀讀地圖吧！加油！";

                document.getElementById('result-msg').innerHTML = 
                    `<div style="background:#f1c40f; padding:15px; border-radius:5px; text-align:center; color:black;">` +
                    `🎉 <b>遊戲結束！總結算</b><br>` +
                    `五回合總得分：<span style="font-size:1.5em; font-weight:bold;">${totalScore}</span> / 500 分<br><br>` +
                    `<b>榮譽稱號：</b><br>${finalRank}</div>`;
                
                const nextBtn = document.getElementById('next-btn');
                nextBtn.innerText = "再玩一次";
                nextBtn.style.backgroundColor = "#34495e";
                nextBtn.onclick = function() {
                    currentRound = 1;
                    totalScore = 0;
                    document.getElementById('hud-score').innerText = totalScore;
                    nextBtn.onclick = nextRound;
                    startNewRound();
                };
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
